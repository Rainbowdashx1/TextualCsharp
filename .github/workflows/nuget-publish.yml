name: Build, Test & Publish NuGet

on:
  push:
    tags:
      - 'v*.*.*'   # Se activa al hacer push de un tag como v1.0.0
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

  publish:
    name: Pack & Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: build-and-test
    # Solo publica cuando el trigger es un tag de versión
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pack NuGet package
        run: |
          dotnet pack TextualCsharp/TextualCsharp.csproj \
            --configuration Release \
            --no-restore \
            -p:PackageVersion=${{ steps.version.outputs.VERSION }} \
            --output ./artifacts

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
